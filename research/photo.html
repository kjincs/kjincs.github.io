<!DOCTYPE html>

  <style>
    body {
      font-family: Arial, sans-serif;

      line-height: 1.6;

    h1 { font-size: 1.3em; margin: 0 0 20px 0; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);

    .gallery figure {

    .gallery img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      object-position: center top;
      display: block;
      border-radius: 4px;
    }

    .gallery figcaption {
      font-size: 0.9em;
      margin-top: 6px;
      text-align: center;
    }

    @media (max-width: 600px) {
      .gallery { grid-template-columns: 1fr; }

</head>
